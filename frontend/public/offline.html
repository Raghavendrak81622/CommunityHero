<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Community Hero</title>
  <style>
    body {
      background-color: #090d16;
      color: #cbd5e1;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      text-align: center;
      overflow: hidden;
    }
    /* Dynamic background grid */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px);
      background-size: 4rem 4rem;
      mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, #000 70%, transparent 100%);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 10;
      max-width: 400px;
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(30, 41, 59, 0.8);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    .icon {
      font-size: 56px;
      color: #6366f1;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.3));
      animation: pulse 2s infinite;
    }
    h1 {
      color: #ffffff;
      font-size: 24px;
      margin: 0 0 12px 0;
      font-weight: 800;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 28px 0;
      color: #94a3b8;
    }
    .btn {
      display: inline-block;
      background-color: #4f46e5;
      color: #ffffff;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      transition: background-color 0.2s, transform 0.2s;
    }
    .btn:hover {
      background-color: #4338ca;
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Connection Lost</h1>
    <p>You are currently offline. Any previously viewed reports and dashboard details remain cached on this device.</p>
    <a href="/" class="btn">Retry Connection</a>
  </div>
</body>
</html>
